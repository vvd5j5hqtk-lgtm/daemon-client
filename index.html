<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daemon Client | MooMoo.io Mod</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>

<nav>
    <div class="logo-container">
        <div class="skull-logo">
            <svg viewBox="0 0 100 100" class="skull-svg">
                <path d="M50 10 C30 10 15 25 15 45 C15 55 20 65 25 70 L25 85 L35 85 L35 75 L65 75 L65 85 L75 85 L75 70 C80 65 85 55 85 45 C85 25 70 10 50 10 Z" fill="white"/>
                <circle cx="35" cy="45" r="6" class="eye" />
                <circle cx="65" cy="45" r="6" class="eye" />
            </svg>
        </div>
        <h1 class="logo-text">DAEMON CLIENT</h1>
    </div>
</nav>

    <header>
        <div class="hero">
            <h1>MooMoo.io Dünyasını <span>Fəth Et</span></h1>
            <p>Daemon Client ilə sürətli auto-heal, inkişaf etmiş botlar və unikal UI təcrübəsi.</p>
            <div class="actions">
                <a href="#" class="main-btn">İndi Yüklə</a>
                <a href="#" class="sec-btn">Premium Al</a>
            </div>
        </div>
    </header>

    <section id="stats">
        <div class="stat-card">
            <h3 id="discord-online">...</h3>
            <p>Discord Aktiv</p>
        </div>
        <div class="stat-card">
            <h3 id="premium-users">15+</h3>
            <p>Premium İstifadəçi</p>
        </div>
        <div class="stat-card">
            <h3 id="total-members">...</h3>
            <p>Cəmi Üzv</p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
