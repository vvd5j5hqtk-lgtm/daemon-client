<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daemon Client | MooMoo.io Mod</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>

    <nav>
        <div class="logo">DAEMON <span>CLIENT</span></div>
        <ul>
            <li><a href="#features">Xüsusiyyətlər</a></li>
            <li><a href="#stats">Statistika</a></li>
            <li><a href="https://discord.gg/yourlink" class="btn-discord">Discord-a Qoşul</a></li>
        </ul>
    </nav>

    <header>
        <div class="hero">
            <h1>MooMoo.io Dünyasını <span>Fəth Et</span></h1>
            <p>Daemon Client ilə sürətli auto-heal, inkişaf etmiş botlar və unikal UI təcrübəsi.</p>
            <div class="actions">
                <a href="#" class="main-btn">İndi Yüklə</a>
                <a href="#" class="sec-btn">Premium Al</a>
            </div>
        </div>
    </header>

    <section id="stats">
        <div class="stat-card">
            <h3 id="discord-online">...</h3>
            <p>Discord Aktiv</p>
        </div>
        <div class="stat-card">
            <h3 id="premium-users">15+</h3>
            <p>Premium İstifadəçi</p>
        </div>
        <div class="stat-card">
            <h3 id="total-members">...</h3>
            <p>Cəmi Üzv</p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
